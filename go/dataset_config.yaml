domain: "code"
language: "go"
min_stars: 1000
exclude_patterns:
  - "tutorial"
  - "awesome"
  - "learn-go"
  - "testdata/"
  - "vendor/"
  - "mocks/"
  
roles:
  - id: "go_generator"
    teacher_model: "llama-3.1-70b-instruct"
    prompt_template: "Extract a functional block of code, generate an instruction asking to write it, and use the code as the response."
    target_samples: 50000

  - id: "go_reviewer"
    teacher_model: "llama-3.1-70b-instruct"
    prompt_template: "Given the code block, mutate it to introduce a subtle concurrency bug. Generate an instruction asking to review the buggy code, and use the bug-fix explanation as the response."
    target_samples: 20000
