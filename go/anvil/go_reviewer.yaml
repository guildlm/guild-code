# Anvil training recipe — Code Guild · go_reviewer (QLoRA SFT + optional DPO)
#
# Code review needs deep context understanding, so we pair a Qwen2.5-7B base
# with a high-rank LoRA. References resolve against the Anvil configs/ root:
#   base_model: qwen2.5_7b -> anvil/configs/base_models/qwen2.5_7b.yaml
#   lora:       high_rank  -> anvil/configs/lora/high_rank.yaml
#
# Copy into anvil/configs/guilds/ then run:
#   anvil-train --config configs/guilds/go_reviewer.yaml
#
# REAL-QUALITY run: train the code-specialized base on a REAL forge dataset.
# Either swap the `base_model:` reference below to `qwen2.5_coder_7b` (ships in
# anvil/configs/base_models/qwen2.5_coder_7b.yaml), or leave it and override at
# the CLI without editing this file:
#   anvil-train --config configs/guilds/go_reviewer.yaml \
#       --model-id Qwen/Qwen2.5-Coder-7B-Instruct \
#       --dataset-path ../../forge/data/datasets/go_code_guild_real_v1.train.jsonl
# See guild-code/DATASETS.md ("Build a real Go dataset (<=$5)") and anvil/TRAINING.md.
name: go_reviewer

base_model: qwen2.5_7b      # real-quality: -> qwen2.5_coder_7b (or --model-id override)
lora: high_rank

dataset:
  path: "../../forge/data/datasets/go_reviewer_v1.train.jsonl"
  eval_path: "../../forge/data/datasets/go_reviewer_v1.validation.jsonl"
  system_prompt: "You are a meticulous senior Go engineer performing code review."

output_dir: "./checkpoints/go_reviewer_adapter"

sft:
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  epochs: 3
  group_by_length: true

# Optional preference-tuning stage (run with `anvil-dpo`) once an SFT adapter
# exists and a chosen/rejected dataset has been produced.
dpo:
  beta: 0.1
  learning_rate: 5.0e-6
  epochs: 1
